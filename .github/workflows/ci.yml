name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_YES: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm jest --watchAll=false --forceExit --testPathIgnorePatterns='src/__integration__'
        env:
          CI: "true"

  build:
    name: Build (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm expo export --platform web
        env:
          CI: "true"
          NODE_ENV: production
      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html missing" && exit 1)
          echo "Build output verified: $(find dist -type f | wc -l) files"

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - name: Restore opencode session cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/opencode
          key: opencode-sessions-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            opencode-sessions-${{ runner.os }}-main
            opencode-sessions-${{ runner.os }}-
      - run: pnpm jest --config jest.integration.config.js
        env:
          CI: "true"
